{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2 class="mb-4 text-center">Add New Product</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="product_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Product Price</label>
            <input type="number" step="0.01" name="product_price" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-control" required>
                <option value="">Select Category</option>
                <option value="men">Men</option>
                <option value="women">Women</option>
                <option value="kids">Kids</option>
                <option value="electronics">Electronics</option>
                <option value="makeup">Makeup</option>
                <option value="accessories">Accessories</option>
            </select>
        </div>
        <!--Product Image Field-->
        <div class="mb-3">
            <label class="form-label">Product Image Filename</label>
            <input type="text" name="product_image" class="form-control" placeholder="e.g. cat-men1.jpeg" required>
        </div>
            <button type="submit" class="btn btn-success w-100">Add Product</button>
    </form>
</div>
{% endblock %}
