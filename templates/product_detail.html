{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <!-- Product Image -->
        <div class="col-md-6">
            <img src="{{ url_for('static', filename='images/' + product.product_image) }}"
                 class="img-fluid rounded shadow-sm"
                 alt="{{ product.product_name }}">
        </div>
        <!-- Product Details -->
        <div class="col-md-6">
            <h2 class="mb-3">{{ product.product_name }}</h2>
            <h4 class="text-success mb-3">₹ {{ product.product_price }}</h4>
            <p class="mb-4"> {{ product.description }} </p>
            <p><strong>Category:</strong> {{ product.category }}</p>
            <a href="{{ url_for('add_to_cart', product_id=product.id) }}" 
               class="btn btn-success btn-lg mt-3">
                Add to Cart
            </a>
            <a href="{{ url_for('products') }}" 
               class="btn btn-outline-secondary btn-lg mt-3">
                Back to Products
            </a>
        </div>
    </div>
</div>
{% endblock %}
