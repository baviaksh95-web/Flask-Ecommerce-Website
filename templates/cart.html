{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h2>Your Cart</h2>
    <table class="table text-center">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Actions</th>
        </tr>
        {% for item in items %}
        <tr>
            <td>{{ item.product.product_name }}</td>
            <td>₹ {{ item.product.product_price }}</td>
            <td>
                <a href="{{ url_for('increase_quantity', item_id=item.id) }}" class="btn btn-sm btn-outline-success">
                    +
                </a>
                {{ item.quantity }}
                <a href="{{ url_for('decrease_quantity', item_id=item.id) }}" class="btn btn-sm btn-outline-danger">
                    -
                </a>
            </td>
            <td>₹ {{ item.product.product_price * item.quantity }}</td>
            <td>
                <a href="{{ url_for('remove_from_cart', item_id=item.id) }}" class="btn btn-sm btn-outline-secondary">
                    Remove
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
